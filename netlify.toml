[Settings]
ID = "327af24a-1868-47c1-959c-7c0afe3b1891"

[build]
publish = "public"
command = "hugo --gc --minify"

[build.environment]
NODE_VERSION = "22"
NODE_ENV = "production"
HUGO_VERSION = "0.163.1"
HUGO_ENV = "production"
HUGO_ENABLEGITINFO = "false"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=1800" # 30min for analytics

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=600" # 10min for analytics

[[headers]]
  for = "/clear/"
  [headers.values]
    Cache-Control = "public, max-age=0, no-cache, no-store, must-revalidate"
    Clear-Site-Data = "*"

[[headers]]
  for = "*.json"
  [headers.values]
    Cache-Control = "public, max-age=1209600, must-revalidate, stale-while-revalidate=86400" # 2w

[[headers]]
  for = "*.css*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js*"
  [headers.values]
    Cache-Control = "public, max-age=1209600" # 2w

[[headers]]
  for = "favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=14515200, must-revalidate" # 6m

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2419200, must-revalidate, stale-while-revalidate=86400"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2419200, must-revalidate, stale-while-revalidate=86400"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2419200, must-revalidate, stale-while-revalidate=86400"

[[headers]]
  for = "*.avif"
  [headers.values]
    Cache-Control = "public, max-age=2419200, must-revalidate, stale-while-revalidate=86400"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2419200, must-revalidate, stale-while-revalidate=86400"

[[edge_functions]]
  function = "block-bots"
  path = "/*"

[[redirects]]
  from = "https://recommandations-medicales.netlify.app/*"
  to = "https://recomedicales.fr/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://recomedicales.fr/scores"
  to = "https://recomedicales.fr/scores/"
  status = 301

[[redirects]]
  from = "https://recomedicales.fr/clear"
  to = "https://recomedicales.fr/clear/"
  status = 301

[[redirects]]
  from = "https://recomedicales.fr/recommandations/allergie-antibiotiques-penicilline/"
  to = "https://recomedicales.fr/recommandations/allergie-penicilline-antibiotiques/"
  status = 301

[[redirects]]
  from = "https://recomedicales.fr/recommandations/maladies-declaration-obligatoire/"
  to = "https://recomedicales.fr/recommandations/maladies-signalement-obligatoire/"
  status = 301

[[redirects]]
  from = "https://recomedicales.fr/images/photos/osteoporose.webp"
  to = "https://recomedicales.fr/images/photos/osteoporose.jpg"
  status = 301

[[redirects]]
  from = "https://recomedicales.fr/login/"
  to = "http://127.0.0.1"
  status = 301

[[redirects]]
  from = "https://recomedicales.fr/wp-login.php"
  to = "http://127.0.0.1"
  status = 301

